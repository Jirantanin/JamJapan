name: CI

on:
  push:
    branches:
      - master
      - 'feat--*'
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.dev.prisma
        env:
          NODE_ENV: development

      - name: Nuxt prepare
        run: npx nuxt prepare
        env:
          DATABASE_URL: file:./prisma/dev.db
          NODE_ENV: development

      - name: Type check
        run: npx nuxt typecheck
        env:
          DATABASE_URL: file:./prisma/dev.db
          NODE_ENV: development

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.dev.prisma
        env:
          NODE_ENV: development

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/dev.db
          NODE_ENV: development
          NUXT_SESSION_PASSWORD: ci-test-session-password-minimum-32-chars
